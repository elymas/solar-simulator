<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar System 3D Simulator</title>
  <meta name="description" content="Interactive 3D Solar System Simulation - Explore planets, orbits, and astronomical data" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta property="og:title" content="Solar System 3D Simulator" />
  <meta property="og:description" content="Explore the solar system in 3D" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1FA90;</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Inter', sans-serif;
      color: #e0e0e0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Responsive: Info Panel */
    @media (max-width: 768px) {
      .info-panel {
        width: 100% !important;
        right: -100% !important;
      }
      .info-panel.open {
        right: 0 !important;
      }
    }

    /* Responsive: Time Controls */
    @media (max-width: 768px) {
      .time-controls {
        width: calc(100% - 32px) !important;
        padding: 10px 16px !important;
        gap: 12px !important;
      }
      #speed-slider {
        width: 80px !important;
      }
    }

    @media (max-width: 480px) {
      .speed-label {
        display: none !important;
      }
      .time-controls {
        gap: 8px !important;
        padding: 8px 12px !important;
      }
    }

    /* Responsive: Planet List */
    @media (max-width: 768px) {
      .planet-list {
        top: auto !important;
        bottom: 70px !important;
        left: 8px !important;
        transform: none !important;
        padding: 10px 8px !important;
        min-width: 130px !important;
      }
      .planet-list-item {
        padding: 6px 8px !important;
        font-size: 12px !important;
      }
      .planet-item-name-ko {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
